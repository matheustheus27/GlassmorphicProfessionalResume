services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cv_frontend_dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: >
      sh -c "
      for f in PersonalData SummaryData SkillsData ExperienceData EducationData SettingsData TranslationsData LanguagesData; do
        if [ ! -f src/app/data/$$f.ts ] && [ -f src/app/data/$$f.ts.example ]; then
          cp src/app/data/$$f.ts.example src/app/data/$$f.ts;
        fi;
      done && npm run dev -- --host
      "
    networks:
      - cv_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: cv_backend_dev
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: sh -c "if [ ! -f .env ] && [ -f .env.example ]; then cp .env.example .env; fi && nodemon server.js"
    networks:
      - cv_network

networks:
  cv_network:
    driver: bridge